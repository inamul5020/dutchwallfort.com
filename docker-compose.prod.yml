version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dutchwallfort-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dutchwallfort-network

  api:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: dutchwallfort-api-prod
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dutchwallfort-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: dutchwallfort-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api
    networks:
      - dutchwallfort-network

volumes:
  postgres_data:
    driver: local

networks:
  dutchwallfort-network:
    driver: bridge
